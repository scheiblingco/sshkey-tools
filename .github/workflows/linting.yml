name: "Pylint"
on:
  push:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "tests/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "tests/**"

jobs:
  linting:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pylint src/sshkey_tools